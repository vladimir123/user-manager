services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: user_manager_dev
    restart: unless-stopped
    ports:
      - "8000:8000" # Laravel dev server
      - "5173:5173" # Vite dev server (HMR)
    volumes:
      - .:/var/www/html # Live code mounting
      - composer_cache:/root/.composer # Cache composer packages
      - npm_cache:/root/.npm # Cache npm packages
    networks:
      - user_manager_dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false # Allows fresh clone without .env — entrypoint creates it
    environment:
      APP_ENV: local
      APP_URL: "http://localhost:8000"
      LOG_CHANNEL: stderr
      SESSION_DRIVER: file # Must be "file" — avoid DB session dependency on startup
      CACHE_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync

  postgres:
    image: postgres:16-alpine
    container_name: user_manager_postgres_dev
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-user_manager}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - user_manager_dev
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-user_manager}" ]
      interval: 3s
      timeout: 5s
      retries: 15

networks:
  user_manager_dev:
    driver: bridge

volumes:
  postgres_dev_data:
  composer_cache:
  npm_cache:
