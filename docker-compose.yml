services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user_manager_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - user_manager_network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}

  nginx:
    image: nginx:1.27-alpine
    container_name: user_manager_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - user_manager_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: user_manager_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_manager
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - user_manager_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U laravel -d user_manager" ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  user_manager_network:
    driver: bridge

volumes:
  postgres_data:
